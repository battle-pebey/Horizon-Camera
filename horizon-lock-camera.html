<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Horizon — Level Camera</title>
<style>
  :root{
    --ink:#0a0c0e;
    --panel:#111417;
    --line:#2a2f34;
    --off:#ff9f1c;
    --level:#3ddc84;
    --text:#eef1f3;
    --dim:#8b9298;
    --mono:'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
    --sans:-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; height:100%; background:var(--ink); color:var(--text);
    font-family:var(--sans); overflow:hidden; user-select:none;
  }
  #app{
    position:fixed; inset:0; display:flex; flex-direction:column;
  }

  /* ---------- viewfinder ---------- */
  #viewport{
    position:relative; flex:1; overflow:hidden; background:#000;
  }
  #video{
    position:absolute; top:50%; left:50%;
    width:140%; height:140%;
    object-fit:cover;
    transform-origin:center center;
    transform:translate(-50%,-50%) rotate(0deg);
    transition:transform .05s linear;
    filter:contrast(1.02);
  }
  #video.mirror{ transform:translate(-50%,-50%) rotate(0deg) scaleX(-1); }

  canvas#overlay{
    position:absolute; inset:0; width:100%; height:100%; pointer-events:none;
  }

  /* permission gate */
  #gate{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:16px; background:var(--ink); text-align:center; padding:32px;
    z-index:20;
  }
  #gate h1{
    font-size:15px; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin:0;
    font-weight:600;
  }
  #gate p{ margin:0; color:var(--text); font-size:14px; max-width:280px; line-height:1.5; }
  #gate button{
    margin-top:8px; background:var(--text); color:var(--ink); border:none;
    padding:14px 28px; border-radius:999px; font-size:14px; font-weight:600;
    letter-spacing:.03em; font-family:var(--sans);
  }
  #gate .err{ color:var(--off); font-size:12px; font-family:var(--mono); }

  /* ---------- top readout bar ---------- */
  #topbar{
    position:absolute; top:0; left:0; right:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
    padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 10px;
    background:linear-gradient(to bottom, rgba(0,0,0,.55), transparent);
  }
  #angleReadout{
    font-family:var(--mono); font-size:13px; letter-spacing:.04em;
    color:var(--off); display:flex; align-items:center; gap:8px;
    padding:6px 14px; border-radius:999px; background:rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.08);
    transition:color .15s ease;
  }
  #angleReadout.level{ color:var(--level); }
  #angleReadout .dot{
    width:6px; height:6px; border-radius:50%; background:currentColor;
  }

  /* ---------- signature: precision horizon ring ---------- */
  #horizonWrap{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    z-index:5;
  }
  #ring{
    width:min(78vw, 78vh); height:min(78vw, 78vh); position:relative;
  }

  /* ---------- bottom controls ---------- */
  #controls{
    position:relative; z-index:10; display:flex; align-items:center;
    justify-content:space-between; padding:18px 26px calc(env(safe-area-inset-bottom,0px) + 22px);
    background:linear-gradient(to top, rgba(0,0,0,.6), transparent);
  }
  .lockToggle{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    background:none; border:none; color:var(--dim); font-family:var(--sans);
  }
  .lockToggle .icon{
    width:44px; height:44px; border-radius:50%; border:1.5px solid var(--line);
    display:flex; align-items:center; justify-content:center; transition:.15s ease;
  }
  .lockToggle.on .icon{ border-color:var(--level); color:var(--level); background:rgba(61,220,132,.1); }
  .lockToggle .lbl{ font-size:10px; letter-spacing:.08em; text-transform:uppercase; }
  .lockToggle.on .lbl{ color:var(--level); }

  #shutter{
    width:72px; height:72px; border-radius:50%; border:3px solid var(--text);
    background:transparent; position:relative; flex:none;
  }
  #shutter::after{
    content:''; position:absolute; inset:6px; border-radius:50%; background:var(--text);
    transition:transform .12s ease, background .12s ease;
  }
  #shutter:active::after{ transform:scale(.82); }
  #shutter.leveled::after{ background:var(--level); }

  .flipBtn{
    width:44px; height:44px; border-radius:50%; border:1.5px solid var(--line);
    background:none; color:var(--dim); font-family:var(--sans); font-size:18px;
    display:flex; align-items:center; justify-content:center;
  }

  #flash{
    position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:30;
  }

  /* preview strip after capture */
  #preview{
    position:fixed; inset:0; background:#000; display:none; z-index:40;
    flex-direction:column;
  }
  #preview img{ flex:1; width:100%; object-fit:contain; background:#000; }
  #preview .bar{
    display:flex; justify-content:space-between; align-items:center;
    padding:16px 22px calc(env(safe-area-inset-bottom,0px) + 18px);
  }
  #preview .bar button{
    background:none; border:1px solid var(--line); color:var(--text);
    padding:11px 20px; border-radius:999px; font-family:var(--sans); font-size:13px;
  }
  #preview .bar a{ text-decoration:none; }
  #preview .bar button.primary{ background:var(--level); border-color:var(--level); color:#04140b; font-weight:600; }
</style>
</head>
<body>
<div id="app">

  <div id="gate">
    <h1>Horizon</h1>
    <p>A level camera. It reads your device's tilt sensor and keeps the frame locked to true horizontal — grant camera and motion access to begin.</p>
    <button id="startBtn">Enable camera &amp; sensors</button>
    <div class="err" id="gateErr"></div>
  </div>

  <div id="topbar" style="display:none">
    <div id="angleReadout"><span class="dot"></span><span id="angleVal">0.0°</span></div>
  </div>

  <div id="viewport" style="display:none">
    <video id="video" autoplay playsinline muted></video>
    <div id="horizonWrap">
      <canvas id="ring" width="600" height="600"></canvas>
    </div>
    <canvas id="overlay"></canvas>
    <div id="flash"></div>
  </div>

  <div id="controls" style="display:none">
    <button class="lockToggle on" id="lockToggle">
      <span class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18"/><circle cx="12" cy="12" r="9"/></svg>
      </span>
      <span class="lbl">Lock</span>
    </button>

    <button id="shutter" aria-label="Capture"></button>

    <button class="flipBtn" id="flipBtn" aria-label="Flip camera">⟲</button>
  </div>

</div>

<div id="preview">
  <img id="previewImg" alt="captured photo">
  <div class="bar">
    <button id="discardBtn">Retake</button>
    <a id="downloadLink" download="horizon-photo.jpg"><button class="primary">Save</button></a>
  </div>
</div>

<script>
(function(){
  const gate = document.getElementById('gate');
  const gateErr = document.getElementById('gateErr');
  const startBtn = document.getElementById('startBtn');
  const topbar = document.getElementById('topbar');
  const viewport = document.getElementById('viewport');
  const controls = document.getElementById('controls');
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const ringCanvas = document.getElementById('ring');
  const angleVal = document.getElementById('angleVal');
  const angleReadout = document.getElementById('angleReadout');
  const shutter = document.getElementById('shutter');
  const lockToggle = document.getElementById('lockToggle');
  const flipBtn = document.getElementById('flipBtn');
  const flash = document.getElementById('flash');
  const preview = document.getElementById('preview');
  const previewImg = document.getElementById('previewImg');
  const discardBtn = document.getElementById('discardBtn');
  const downloadLink = document.getElementById('downloadLink');

  let currentRoll = 0;          // smoothed roll angle in degrees
  let rawRoll = 0;
  let lockEnabled = true;
  let facingMode = 'environment';
  let stream = null;
  const LEVEL_THRESHOLD = 0.6;  // degrees considered "level"

  const octx = overlay.getContext('2d');
  const rctx = ringCanvas.getContext('2d');

  function resizeOverlay(){
    overlay.width = overlay.clientWidth * devicePixelRatio;
    overlay.height = overlay.clientHeight * devicePixelRatio;
  }
  window.addEventListener('resize', resizeOverlay);

  // ---------- orientation math ----------
  function getScreenAngle(){
    if (screen.orientation && typeof screen.orientation.angle === 'number') return screen.orientation.angle;
    if (typeof window.orientation === 'number') return window.orientation;
    return 0;
  }

  function rollFromEvent(e){
    const a = getScreenAngle();
    const beta = e.beta || 0, gamma = e.gamma || 0;
    if (a === 0) return gamma;
    if (a === 90) return -beta;
    if (a === -90 || a === 270) return beta;
    return -gamma; // 180
  }

  function handleOrientation(e){
    rawRoll = rollFromEvent(e);
    // clamp to a sane visual range so extreme tilts don't spin the frame
    let clamped = Math.max(-45, Math.min(45, rawRoll));
    // low-pass smoothing for a steady, non-jittery lock
    currentRoll += (clamped - currentRoll) * 0.18;
    render();
  }

  // ---------- rendering ----------
  function render(){
    const displayAngle = lockEnabled ? -currentRoll : 0;
    video.style.transform = `translate(-50%,-50%) rotate(${displayAngle}deg)`;

    const isLevel = Math.abs(currentRoll) < LEVEL_THRESHOLD;
    angleVal.textContent = Math.abs(currentRoll).toFixed(1) + '°';
    angleReadout.classList.toggle('level', isLevel);
    shutter.classList.toggle('leveled', isLevel);

    drawRing(currentRoll, isLevel);
  }

  function drawRing(roll, isLevel){
    const w = ringCanvas.width, h = ringCanvas.height;
    rctx.clearRect(0,0,w,h);
    const cx = w/2, cy = h/2;
    const R = w*0.46;
    const color = isLevel ? '#3ddc84' : '#ff9f1c';

    rctx.save();
    rctx.translate(cx, cy);

    // outer static reference ring (ticks every 15deg)
    rctx.strokeStyle = 'rgba(255,255,255,0.14)';
    rctx.lineWidth = 1.5;
    for(let d=0; d<360; d+=15){
      const rad = d*Math.PI/180;
      const inner = R*0.9, outer = R;
      rctx.beginPath();
      rctx.moveTo(inner*Math.cos(rad), inner*Math.sin(rad));
      rctx.lineTo(outer*Math.cos(rad), outer*Math.sin(rad));
      rctx.stroke();
    }

    // rotating horizon line — this is the element that visually "locks"
    rctx.rotate(-roll * Math.PI/180);
    rctx.strokeStyle = color;
    rctx.lineWidth = 2.5;
    rctx.beginPath();
    rctx.moveTo(-R, 0);
    rctx.lineTo(R, 0);
    rctx.stroke();

    // center tick + small wings, like a surveyor's level
    rctx.beginPath();
    rctx.moveTo(0, -10); rctx.lineTo(0, 10);
    rctx.stroke();
    [-R*0.5, R*0.5].forEach(x=>{
      rctx.beginPath();
      rctx.moveTo(x, -6); rctx.lineTo(x, 6);
      rctx.stroke();
    });

    rctx.restore();

    // fixed center crosshair reference (does not rotate)
    rctx.strokeStyle = 'rgba(255,255,255,0.35)';
    rctx.lineWidth = 1.5;
    rctx.beginPath();
    rctx.moveTo(cx-14, cy); rctx.lineTo(cx+14, cy);
    rctx.moveTo(cx, cy-14); rctx.lineTo(cx, cy+14);
    rctx.stroke();
  }

  // ---------- camera ----------
  async function startCamera(){
    if (stream) stream.getTracks().forEach(t=>t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode, width:{ideal:1920}, height:{ideal:1080} },
      audio:false
    });
    video.srcObject = stream;
    video.classList.toggle('mirror', facingMode === 'user');
    await video.play();
  }

  flipBtn.addEventListener('click', async ()=>{
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    try { await startCamera(); } catch(e){}
  });

  lockToggle.addEventListener('click', ()=>{
    lockEnabled = !lockEnabled;
    lockToggle.classList.toggle('on', lockEnabled);
    render();
  });

  // ---------- capture ----------
  shutter.addEventListener('click', ()=>{
    flash.style.transition = 'none';
    flash.style.opacity = '0.9';
    requestAnimationFrame(()=>{
      flash.style.transition = 'opacity .25s ease';
      flash.style.opacity = '0';
    });

    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return;

    const angle = lockEnabled ? -currentRoll : 0;
    const rad = angle * Math.PI/180;

    // output canvas sized to the visible viewport aspect ratio
    const vpRect = document.getElementById('viewport').getBoundingClientRect();
    const outW = 1080, outH = Math.round(outW * (vpRect.height/vpRect.width));
    const cnv = document.createElement('canvas');
    cnv.width = outW; cnv.height = outH;
    const ctx = cnv.getContext('2d');

    // draw video scaled/rotated the same way the CSS preview is transformed,
    // so the saved photo matches what was on screen (leveled horizon).
    const scale = 1.4 * Math.max(outW/vw, outH/vh);
    ctx.save();
    ctx.translate(outW/2, outH/2);
    ctx.rotate(rad);
    if (video.classList.contains('mirror')) ctx.scale(-1,1);
    ctx.drawImage(video, -vw*scale/2, -vh*scale/2, vw*scale, vh*scale);
    ctx.restore();

    const url = cnv.toDataURL('image/jpeg', 0.92);
    previewImg.src = url;
    downloadLink.href = url;
    preview.style.display = 'flex';
  });

  discardBtn.addEventListener('click', ()=>{ preview.style.display = 'none'; });

  // ---------- boot sequence ----------
  async function requestMotionPermission(){
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function'){
      const res = await DeviceOrientationEvent.requestPermission();
      if (res !== 'granted') throw new Error('Motion sensor access denied');
    }
  }

  startBtn.addEventListener('click', async ()=>{
    gateErr.textContent = '';
    try{
      await startCamera();
      await requestMotionPermission();
      window.addEventListener('deviceorientation', handleOrientation, true);

      gate.style.display = 'none';
      topbar.style.display = 'flex';
      viewport.style.display = 'block';
      controls.style.display = 'flex';
      resizeOverlay();
      render();
    }catch(err){
      gateErr.textContent = err.message || 'Could not access camera or sensors.';
    }
  });
})();
</script>
</body>
</html>
